name: VotingSample
services:
  - name: vote
    project: vote/vote.csproj
  - name: worker
    repository: https://github.com/drakon660/tests-multi-repo-worker.git
  - name: redis
    image: redis
    bindings:
      - port: 6378cd
        containerPort: 6379
        connectionString: ${host}:${port}
